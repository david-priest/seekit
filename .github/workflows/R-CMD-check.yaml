# R CMD check — runs on push, PR, and daily (catches upstream CRAN breakage).
# Generated by analogy to usethis::use_github_action_check_standard().
# https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # 07:00 UTC daily ≈ 17:00 AEST / 18:00 AEDT. Catches CRAN-side breakage
    # without needing a code change to trigger.
    - cron: '0 7 * * *'
  workflow_dispatch:    # allow manual runs from the Actions tab

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          # Add windows-latest if/when you care; CyTOF folk usually don't.

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          # Don't fail the run on NOTEs (we'll have many until roxygen is added).
          # Switch to "error" once the warning surface is cleaned up.
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
